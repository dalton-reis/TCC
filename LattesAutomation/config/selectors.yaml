# Ajuste estes seletores após inspecionar as páginas atuais.
biblioteca:
  search_input: '#expressaoBusca'
  search_type_author: 'input[name="rdbtTpConsulta"][value="12"]'
  search_submit: 'form[action*="listaCabecalho.php"] input[type="submit"]'
  authority_links: 'a[href*="consultaCabecalho.php"][href*="CdCabecalho="]'
  result_links: 'a[href*="recuperaMfnCompleto.php"][href*="CdMFN="]'
  page_links: 'a[href*="consultaCabecalho.php"][href*="pagina="]'
  detail:
    fields: 'table tr'

lattes:
  completed_guidance_link:
    role: "link"
    name: "Orientações e supervisões concluídas"
  add_button:
    role: "button"
    name: "Adicionar"
  fields:
    student_name: 'input[name*="nome"]'
    title: 'input[name*="titulo"]'
    year: 'input[name*="ano"]'
    institution: 'input[name*="instituicao"]'
    course: 'input[name*="curso"]'
    work_type: 'select[name*="tipo"]'
  forbidden_save:
    - 'button:has-text("Salvar")'
    - 'input[value="Salvar"]'
